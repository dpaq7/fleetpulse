name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint (sqlfluff + ruff)
    runs-on: ubuntu-latest
    env:
      DBT_PROFILES_DIR: ./dbt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install lint dependencies
        run: pip install dbt-core==1.8.* dbt-snowflake==1.8.* ruff==0.7.* sqlfluff==3.2.* sqlfluff-templater-dbt==3.2.*
      - name: dbt deps
        working-directory: dbt
        run: dbt deps
      - name: Install demo dbt profile
        run: cp dbt/profiles.yml.demo dbt/profiles.yml
      - name: ruff
        run: ruff check .
      - name: sqlfluff advisory
        continue-on-error: true
        run: sqlfluff lint dbt/models

  dbt-parse:
    name: dbt parse
    runs-on: ubuntu-latest
    needs: lint
    env:
      DBT_PROFILES_DIR: ./dbt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install dbt-core==1.8.* dbt-snowflake==1.8.*
      - name: dbt deps
        working-directory: dbt
        run: dbt deps
      - name: Install demo dbt profile
        run: cp dbt/profiles.yml.demo dbt/profiles.yml
      - name: dbt parse
        working-directory: dbt
        run: dbt parse --profiles-dir . --profile fleetpulse

  dbt-build:
    name: dbt build + test
    runs-on: ubuntu-latest
    needs: lint
    if: ${{ vars.ENABLE_DBT_CI == 'true' }}
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_SCHEMA: ci_build
      DBT_PROFILES_DIR: ./dbt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: dbt deps
        working-directory: dbt
        run: dbt deps
      - name: dbt build
        working-directory: dbt
        run: dbt build --target ci

  pytest:
    name: pytest
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install pytest==8.3.*
      - run: pytest tests/ -v
      - name: Check portfolio docs and screenshots
        run: |
          test -f README.md
          test -f docs/resume_alignment.md
          test -f docs/screenshots/01_fleet_kpis.png
          test -f docs/screenshots/02_route_performance.png
          test -f docs/screenshots/03_warehouse_utilization.png
          test -f docs/screenshots/04_anomaly_alerts.png
